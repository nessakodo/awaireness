    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Awaireness",

        "AI energy usage calculator",
        "AI CO₂ emissions calculator",
        "Privacy-first — zero data persistence",
        "ChatGPT and Anthropic export parsing",
        "Shareable impact cards"
      ],
      "author": {
        "@type": "Person",
        "name": "nessakodo",
        "url": "https://github.com/nessakodo"

    }
    </script>
  </head>
  <body class="bg-surface-0 text-white antialiased">
